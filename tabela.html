<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela - Košarkaška Liga Knjaževine Crne Gore</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
}

/* Naslov */
header{
    background:linear-gradient(90deg,#0d1b5e,#1565c0);
    color:white;
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:40px;
}

header p{
    margin-top:10px;
    font-size:18px;
}

/* Tabela */

.container{
    width:95%;
    max-width:1100px;
    margin:40px auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
    background:#1565c0;
    color:white;
    padding:16px;
    font-size:18px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

td:nth-child(2){
    text-align:left;
    font-weight:bold;
}

tr:nth-child(even){
    background:#f5f9ff;
}

tr:hover{
    background:#dbeaff;
}

@media(max-width:768px){

.container{
overflow-x:auto;
}

table{
min-width:700px;
}

header h1{
font-size:28px;
}

}
</style>

</head>

<body>

<header>
<h1>Košarkaška Liga Knjaževine Crne Gore</h1>
<p>Zvanična tabela prvenstva</p>
</header>

</tbody>

</div>

</body>
</html>
